services:

  app-test:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: testing

    environment:
      - APP_ENV=testing
      - APP_KEY=base64:BGvVfmL7O+KmS98TqaMyN1xSomfyYgbbyS43OOWiOqw=
      - APP_DEBUG=true
